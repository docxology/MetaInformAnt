# METAINFORMANT Amalgkit Configuration
# Species: Megachile rotundata (Alfalfa leafcutter bee)
# NCBI Taxonomy ID: 143995
# Assembly: GCF_000226025.1
# Note: Added for Hymenoptera cross-species tissue comparisons (gut, head, ovary)

work_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/work
log_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/logs
threads: 16

auto_install_amalgkit: true

filters:
  require_tissue: false

species_list:
  - Megachile_rotundata

taxon_id: 143995

genome:
  accession: GCF_000226025.1
  dest_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/genome

  include:
    - genome           
    - gff3            
    - rna             
    - cds             
    - protein         

  ftp_url: https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/226/025/GCF_000226025.1/
  files:
    genomic_fasta: GCF_000226025.1_genomic.fna.gz
    transcriptome_fasta: GCF_000226025.1_rna_from_genomic.fna.gz
    cds_fasta: GCF_000226025.1_cds_from_genomic.fna.gz
    protein_fasta: GCF_000226025.1_protein.faa.gz
    annotation_gff: GCF_000226025.1_genomic.gff.gz

steps:
  metadata:
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/work
    search_string: '"Megachile rotundata"[Organism] AND RNA-Seq[Strategy] AND Illumina[Platform]'
    redo: no
  integrate:
    fastq_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/fastq/getfastq
  config: {}
  select: {}
  getfastq:
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/fastq
    remove_sra: yes
    threads: 16
    pfd: yes
    redo: no
  quant:
    jobs: 1
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/quant
    threads: 16
    redo: no
    keep_fastq: no
  merge:
    out: projects/hymenoptera_amalgkit/data/megachile_rotundata/merged/merged_abundance.tsv
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/merged
  cstmm:
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/cstmm
  curate:
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/curate
  csca:
    out_dir: projects/hymenoptera_amalgkit/data/megachile_rotundata/csca
  sanity: {}
