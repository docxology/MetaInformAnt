# Amalgkit Cross-Species Configuration
# Comparative transcriptomics across 22 ant/bee species

# Working directory
work_dir: output/amalgkit/cross_species/work
log_dir: output/amalgkit/cross_species/logs
threads: 16

# All 22 species (21 ants + 1 bee) from the pipeline
species_list:
  # ── Ants (21 species, sorted by sample count ascending) ──
  - Anoplolepis_gracilipes
  - Acromyrmex_echinatior
  - Dinoponera_quadriceps
  - Vollenhovia_emeryi
  - Odontomachus_brunneus
  - Formica_exsecta
  - Temnothorax_americanus
  - Wasmannia_auropunctata
  - Nylanderia_fulva
  - Temnothorax_curvispinosus
  - Pogonomyrmex_barbatus
  - Cardiocondyla_obscurior
  - Temnothorax_nylanderi
  - Linepithema_humile
  - Atta_cephalotes
  - Ooceraea_biroi
  - Camponotus_floridanus
  - Solenopsis_invicta
  - Monomorium_pharaonis
  - Temnothorax_longispinosus
  - Harpegnathos_saltator
  # ── Bees ──
  - Apis_mellifera

# Steps configuration
steps:
  # Cross-Species TMM Normalization
  cstmm:
    out_dir: output/amalgkit/cross_species/cstmm
    # Path to the ortholog table we are generating
    orthogroup_table: output/amalgkit/cross_species/orthologs/orthogroups.tsv
    
    # Directory where per-species merge outputs are located
    # Note: amalgkit usually looks in {out_dir}/merge, but for cross-species
    # we might need to symlink or specify paths. 
    # Since amalgkit structure expects species subdirs, we'll need to 
    # structure the input directory correctly.
    dir_count: output/amalgkit/cross_species/work/merge_inputs

  # Cross-Species Correlation Analysis
  csca:
    out_dir: output/amalgkit/cross_species/csca
    orthogroup_table: output/amalgkit/cross_species/orthologs/orthogroups.tsv
    sample_group: tissue
    
# Debug options
debug:
  verbose: true
