# METAINFORMANT Amalgkit Configuration
# Species: Polistes fuscatus (Paper wasp)
# NCBI Taxonomy ID: 30207
# Assembly: GCF_000220695.1
# Note: Added for Hymenoptera cross-species tissue comparisons (brain, fast body, ovary)

work_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/work
log_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/logs
threads: 4

auto_install_amalgkit: true

filters:
  require_tissue: false

species_list:
  - Polistes_fuscatus

taxon_id: 30207

genome:
  accession: GCF_000220695.1
  dest_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/genome

  include:
    - genome           
    - gff3            
    - rna             
    - cds             
    - protein         

  ftp_url: https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/000/220/695/GCF_000220695.1/
  files:
    genomic_fasta: GCF_000220695.1_genomic.fna.gz
    transcriptome_fasta: GCF_000220695.1_rna_from_genomic.fna.gz
    cds_fasta: GCF_000220695.1_cds_from_genomic.fna.gz
    protein_fasta: GCF_000220695.1_protein.faa.gz
    annotation_gff: GCF_000220695.1_genomic.gff.gz

steps:
  metadata:
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/work
    search_string: '"Polistes fuscatus"[Organism] AND RNA-Seq[Strategy] AND Illumina[Platform]'
    redo: no
  integrate:
    fastq_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/fastq/getfastq
  config: {}
  select: {}
  getfastq:
    max_bp: 10000000000
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/fastq
    remove_sra: yes
    threads: 4
    pfd: yes
    redo: no
  quant:
    jobs: 1
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/quant
    threads: 4
    redo: no
    keep_fastq: no
  merge:
    out: projects/hymenoptera_amalgkit/data/polistes_fuscatus/merged/merged_abundance.tsv
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/merged
  cstmm:
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/cstmm
  curate:
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/curate
  csca:
    out_dir: projects/hymenoptera_amalgkit/data/polistes_fuscatus/csca
  sanity: {}
